<header>
    <h2>Lista Roles</h2>
    <button class="btn btn-primary shadow-hover" id="btn-add-role">+ New Role</button>
</header>

<div class="card glass-effect">
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="role-list">
            <!-- Data populated via JS -->
        </tbody>
    </table>
</div>

<!-- Modal for Create/Edit -->
<div class="modal" id="role-modal">
    <div class="modal-content glass-effect">
        <div class="modal-header">
            <h3 id="role-modal-title">Create Role</h3>
            <span class="close-btn" id="close-role-modal">&times;</span>
        </div>
        <div class="modal-body">
            <form id="role-form">
                <input type="hidden" id="role-id">
                <div class="form-group">
                    <label for="role-name">Name</label>
                    <input type="text" id="role-name" required placeholder="E.g., Administrator" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="role-desc">Description</label>
                    <textarea id="role-desc" rows="3" placeholder="Role description..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-save-role">Guardar Rol</button>
            </form>
        </div>
    </div>
</div>
