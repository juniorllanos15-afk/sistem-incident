<header>
    <h2>Lista categoria</h2>
    <button class="btn btn-primary shadow-hover" id="btn-add-category">+ New Category</button>
</header>

<div class="card glass-effect">
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="category-list">
            <!-- Data populated via JS -->
        </tbody>
    </table>
</div>

<!-- Modal for Create/Edit -->
<div class="modal" id="category-modal">
    <div class="modal-content glass-effect">
        <div class="modal-header">
            <h3 id="modal-title">Create Category</h3>
            <span class="close-btn" id="close-modal">&times;</span>
        </div>
        <div class="modal-body">
            <form id="category-form">
                <input type="hidden" id="cat-id">
                <div class="form-group">
                    <label for="cat-name">Name</label>
                    <input type="text" id="cat-name" required placeholder="E.g., Hardware Issue" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="cat-desc">Description</label>
                    <textarea id="cat-desc" rows="3" placeholder="Category description..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-save">Registrar Categoria</button>
            </form>
        </div>
    </div>
</div>
